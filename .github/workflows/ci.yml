---
name: CI
'on':
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 3"

defaults:
  run:
    working-directory: 'call_learning.moodle'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'call_learning.moodle'

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install yamllint ansible

      - name: Lint code.
        run: |
          yamllint .

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rockylinux10
          - ubuntu2404
          - ubuntu2204
          - debian13
          - debian12
        include:
          - distro: debian13
            moodle_version: MOODLE_500_STABLE
            moodle_release_prefix: '5.0.'
          - distro: debian12
            php_fpm_handler_state: reloaded

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'call_learning.moodle'

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install ansible molecule molecule-plugins[docker] docker

      # See: https://github.com/geerlingguy/ansible-role-mysql/issues/422
      # Debian 12/13 can also block php-fpm with AppArmor during verify.
      - name: Disable AppArmor on Debian.
        run: |
          set -x
          sudo apt-get install -y apparmor-profiles
          for profile in \
            /etc/apparmor.d/usr.sbin.mysqld \
            /etc/apparmor.d/usr.sbin.php-fpm \
            /etc/apparmor.d/usr.sbin.php-fpm8.2 \
            /etc/apparmor.d/usr.sbin.php-fpm8.4
          do
            if [ -e "$profile" ]; then
              sudo ln -sf "$profile" /etc/apparmor.d/disable/
              sudo apparmor_parser -R "$profile" || true
            fi
          done
        if: ${{ startsWith(matrix.distro, 'debian') }}

      - name: Run Molecule tests.
        run: molecule test --all
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          MOODLE_VERSION: ${{ matrix.moodle_version || 'MOODLE_405_STABLE' }}
          MOODLE_RELEASE_PREFIX: ${{ matrix.moodle_release_prefix || '4.5.' }}
          PHP_FPM_HANDLER_STATE: ${{ matrix.php_fpm_handler_state || 'restarted' }}
