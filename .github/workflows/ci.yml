---
name: CI
'on':
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 3"

defaults:
  run:
    working-directory: 'call_learning.moodle'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'call_learning.moodle'

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install yamllint ansible

      - name: Lint code.
        run: |
          yamllint .

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: default
            distro: rockylinux10
          - scenario: default
            distro: ubuntu2404
          - scenario: default
            distro: ubuntu2204
          - scenario: default
            distro: debian13
            moodle_version: MOODLE_500_STABLE
            moodle_release_prefix: '5.0.'
            php_fpm_handler_state: reloaded
          - scenario: default
            distro: debian12
            php_fpm_handler_state: reloaded
          - scenario: postgres
            distro: rockylinux10
          - scenario: postgres
            distro: debian13
            php_fpm_handler_state: reloaded
          - scenario: update
            distro: debian13
            moodle_update_from_version: v5.0.0
            moodle_update_to_version: MOODLE_500_STABLE
            php_fpm_handler_state: reloaded

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'call_learning.moodle'

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install ansible molecule molecule-plugins[docker] docker

      # See: https://github.com/geerlingguy/ansible-role-mysql/issues/422
      - name: Disable AppArmor on Debian.
        run: |
            set -x
            sudo apt-get install apparmor-profiles
            sudo ln -s /etc/apparmor.d/usr.sbin.mysqld /etc/apparmor.d/disable/
            sudo apparmor_parser -R /etc/apparmor.d/usr.sbin.mysqld
        if: ${{ startsWith(matrix.distro, 'debian') }}

      - name: Run Molecule tests.
        run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          MOODLE_VERSION: ${{ matrix.moodle_version || 'MOODLE_405_STABLE' }}
          MOODLE_RELEASE_PREFIX: ${{ matrix.moodle_release_prefix || '4.5.' }}
          PHP_FPM_HANDLER_STATE: ${{ matrix.php_fpm_handler_state || 'restarted' }}
          MOODLE_UPDATE_FROM_VERSION: ${{ matrix.moodle_update_from_version || '' }}
          MOODLE_UPDATE_TO_VERSION: ${{ matrix.moodle_update_to_version || '' }}
