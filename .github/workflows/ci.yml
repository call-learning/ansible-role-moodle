---
name: CI
'on':
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 3"

defaults:
  run:
    working-directory: 'call_learning.moodle'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'call_learning.moodle'

      - name: Set up uv.
        uses: astral-sh/setup-uv@v4

      - name: Lint code.
        run: uvx yamllint .

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: default
            distro: rockylinux10
          - scenario: default
            distro: ubuntu2404
          - scenario: default
            distro: ubuntu2204
          - scenario: default
            distro: debian13
            moodle_version: MOODLE_500_STABLE
            moodle_release_prefix: '5.0.'
          - scenario: default
            distro: debian12
          - scenario: postgres
            distro: rockylinux10
          - scenario: postgres
            distro: ubuntu2404
          - scenario: update
            distro: debian13
            moodle_update_from_version: v5.0.0
            moodle_update_to_version: v5.0.1

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'call_learning.moodle'

      - name: Set up uv.
        uses: astral-sh/setup-uv@v4

      - name: Install test dependencies.
        run: uv sync --frozen --python 3.12

      - name: Print environment versions for local/CI comparison.
        run: |
          echo "=== Python packages ==="
          uv pip show ansible ansible-core molecule molecule-docker docker \
            | grep -E "^(Name|Version):"
          echo ""
          echo "=== Ansible version ==="
          uv run ansible --version
          echo ""
          echo "=== Docker image digest ==="
          MOLECULE_IMAGE="geerlingguy/docker-${{ matrix.distro }}-ansible:latest"
          docker pull "$MOLECULE_IMAGE" --quiet
          docker inspect --format='{{.Id}} created={{.Created}}' "$MOLECULE_IMAGE"
          echo ""
          echo "=== Ansible Galaxy roles ==="
          uv run ansible-galaxy install -r molecule-requirements.yml 2>&1 | grep -E "^- " || true
          uv run ansible-galaxy role list | grep -v "# " | sort

      # See: https://github.com/geerlingguy/ansible-role-mysql/issues/422
      # Debian 12/13 can also block php-fpm with AppArmor during verify.
      - name: Disable AppArmor on Debian.
        run: |
          set -x
          sudo apt-get install -y apparmor-profiles
          for profile in \
            /etc/apparmor.d/usr.sbin.mysqld \
            /etc/apparmor.d/usr.sbin.mariadb \
            /etc/apparmor.d/php-fpm
          do
            if [ -e "$profile" ]; then
              sudo ln -sf "$profile" /etc/apparmor.d/disable/
              sudo apparmor_parser -R "$profile" || true
            fi
          done
        if: ${{ startsWith(matrix.distro, 'debian') }}

      - name: Run Molecule tests.
        run: |
          if [ "${{ vars.MOLECULE_DEBUG }}" = "1" ]; then
            uv run molecule --debug -vvv test -s ${{ matrix.scenario }}
          else
            uv run molecule test -s ${{ matrix.scenario }}
          fi
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          MOODLE_VERSION: ${{ matrix.moodle_version || 'MOODLE_405_STABLE' }}
          MOODLE_RELEASE_PREFIX: ${{ matrix.moodle_release_prefix || '4.5.' }}
          PHP_FPM_HANDLER_STATE: ${{ matrix.php_fpm_handler_state || 'restarted' }}
          MOODLE_UPDATE_FROM_VERSION: ${{ matrix.moodle_update_from_version || '' }}
          MOODLE_UPDATE_TO_VERSION: ${{ matrix.moodle_update_to_version || '' }}
