---
# This workflow requires a GALAXY_API_KEY secret present in the GitHub
# repository or organization.
#
# See: https://github.com/marketplace/actions/publish-ansible-role-to-galaxy
# See: https://github.com/ansible/galaxy/issues/46

name: Release
'on':
  push:
    tags:
      - '*'

jobs:

  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release prerequisites
        id: checks
        shell: bash
        run: |
          if [ -z "${{ secrets.GALAXY_API_KEY }}" ]; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=GALAXY_API_KEY secret is not configured." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin master --depth=1

          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=Tag ${GITHUB_REF_NAME} points to a commit on master." >> "$GITHUB_OUTPUT"
          else
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=Tag ${GITHUB_REF_NAME} does not point to a commit on master." >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release
        if: steps.checks.outputs.can_publish != 'true'
        run: echo "::notice::${{ steps.checks.outputs.reason }}"

      - name: Set up uv.
        if: steps.checks.outputs.can_publish == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Trigger a new import on Galaxy.
        if: steps.checks.outputs.can_publish == 'true'
        run: >-
          uvx --from ansible-core ansible-galaxy role import --api-key ${{ secrets.GALAXY_API_KEY }}
          $(echo ${{ github.repository }} | cut -d/ -f1) $(echo ${{ github.repository }} | cut -d/ -f2)
