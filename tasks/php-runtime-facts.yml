---

- name: Detect PHP version for native Debian packages
  set_fact:
    php_version: "{{ '8.4' if (ansible_distribution_major_version | int) >= 13 else '8.2' }}"
  when:
    - php_package_strategy == 'native'
    - php_version is not defined or not php_version
    - ansible_distribution == 'Debian'

- name: Detect PHP version for native Ubuntu packages
  set_fact:
    php_version: "{{ '8.3' if (ansible_distribution_major_version | int) >= 24 else '8.1' }}"
  when:
    - php_package_strategy == 'native'
    - php_version is not defined or not php_version
    - ansible_distribution == 'Ubuntu'

- name: Detect PHP version for native RedHat packages
  set_fact:
    php_version: "8.0"
  when:
    - php_package_strategy == 'native'
    - php_version is not defined or not php_version
    - ansible_os_family == 'RedHat'

- name: Fail when php_version is still undefined
  fail:
    msg: >-
      php_version is not defined for this host. Set php_version explicitly or
      extend tasks/php-runtime-facts.yml for this distribution when using
      php_package_strategy={{ php_package_strategy }}.
  when: php_version is not defined or not php_version

- name: Set PHP runtime facts for Debian like systems
  set_fact:
    php_default_version_debian: "{{ php_version }}"
    php_cli_versioned_bin: "/usr/bin/php{{ php_version }}"
    php_cli_bin: "{{ (php_set_default_cli | bool) | ternary('php', '/usr/bin/php' ~ php_version) }}"
    php_fpm_service_name: "php{{ php_version }}-fpm"
    php_fpm_config_dir: "/etc/php/{{ php_version }}/fpm"
    php_fpm_main_config_file: "/etc/php/{{ php_version }}/fpm/php-fpm.conf"
    php_fpm_pool_dir: "/etc/php/{{ php_version }}/fpm/pool.d"
    php_fpm_ini_file: "/etc/php/{{ php_version }}/fpm/php.ini"
  when: ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'

- name: Set PHP runtime facts for RedHat systems
  set_fact:
    php_cli_versioned_bin: "/usr/bin/php"
    php_cli_bin: "php"
    php_fpm_service_name: "php-fpm"
    php_fpm_config_dir: "/etc"
    php_fpm_main_config_file: "/etc/php-fpm.conf"
    php_fpm_pool_dir: "/etc/php-fpm.d"
    php_fpm_ini_file: "/etc/php.ini"
  when: ansible_os_family == 'RedHat'
