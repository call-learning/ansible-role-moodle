---

# Usual tweaks and php mandatory packages for Moodle
# We don't use any of these tasks in the role itself as
# this is only a tool here to be used in other playbook like:
# - import_role: call_learning.moodle
#      tasks_from: phpsql-setup.yml
#      tags: install

#
# Global Packages
#

# Debian
- name: Update apt cache.
  apt:
    update_cache: true
  when: ansible_os_family == 'Debian'
  changed_when: false

- name: Add specific packages for Debian
  apt:
    pkg:
      - python3-crontab
      - cron
      - python3-pymysql
    state: present
  when: ansible_distribution == "Debian"

- name: Add specific packages for Redhat/Centos
  yum:
    name: cronie
    state: present
  when: ansible_os_family == 'RedHat'

- name: Define postgresql_version to 13 for RedHat/CentOS.
  set_fact:
    postgresql_version: "13"
  when: ansible_os_family == "RedHat"

# ALL Systems
- name: Install dependencies.
  package:
    name: "{{ item }}"
  loop:
    - unzip
    - sendmail

- name: Install curl for all systems
  package: name=curl
  when: ansible_os_family != "RedHat"

- name: Install curl via DNF
  ansible.builtin.dnf:
    name: curl
    state: present
    allowerasing: true
  when: ansible_os_family == "RedHat"

- name: Add MariaDB repository
  copy:
    dest: /etc/yum.repos.d/MariaDB.repo
    content: |
      [mariadb]
      name = MariaDB
      baseurl = http://yum.mariadb.org/10.6/rhel9-amd64
      gpgkey=https://yum.mariadb.org/RPM-GPG-KEY-MariaDB
      gpgcheck=1
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int < 10
#
# PHP Packages
#

- name: Set php packages for all distributions
  set_fact:
    php_packages:
      - php-cli
      - php-common
      - php-curl
      - php-gd
      - php-intl
      - php-mbstring
      - php-opcache
      - php-readline
      - php-soap
      - php-xml
      - php-xmlrpc
      - php-fpm
      - php-ldap
      - php-solr
      - php-redis
      - php-apcu
      - php-zip
      - php-exif

- name: Drop unsupported PHP extensions on RedHat 10+.
  set_fact:
    php_packages: "{{ php_packages | difference(['php-solr', 'php-xmlrpc']) }}"
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int >= 10

- name: Set php_packages (apcu) for PHP Rocky.
  set_fact:
    php_packages: "{{ php_packages + ['php-pecl-apcu'] }}"
  when: ansible_os_family == "RedHat"

- name: Set php_package for postgres
  set_fact:
    php_packages: "{{ php_packages + [ 'php-pgsql' ] }}"
  when: dbengine == 'postgres' or ( install_all_db_php_modules is defined and install_all_db_php_modules )

- name: Set php_package for MySQL on RedHat 10+.
  set_fact:
    php_packages: "{{ php_packages + [ 'php-mysqlnd' ] }}"
  when:
    - dbengine == 'mysql' or ( install_all_db_php_modules is defined and install_all_db_php_modules )
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int >= 10

- name: Set php_package for MySQL.
  set_fact:
    php_packages: "{{ php_packages + [ 'php-mysql' ] }}"
  when:
    - dbengine == 'mysql' or ( install_all_db_php_modules is defined and install_all_db_php_modules )
    - ansible_os_family != "RedHat" or ansible_distribution_major_version | int < 10
