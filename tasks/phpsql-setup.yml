---

# Usual tweaks and php mandatory packages for Moodle
# We don't use any of these tasks in the role itself as
# this is only a tool here to be used in other playbook like:
# - import_role: call_learning.moodle
#      tasks_from: phpsql-setup.yml
#      tags: install

- name: Compute PHP version and runtime facts
  import_tasks: php-runtime-facts.yml

#
# Global Packages
#

# Debian
- name: Update apt cache.
  apt:
    update_cache: true
  when: ansible_os_family == 'Debian'
  changed_when: false

- name: Add specific packages for Debian
  apt:
    pkg:
      - python3-crontab
      - cron
      - python3-pymysql
    state: present
  when: ansible_distribution == "Debian"

- name: Add specific packages for Redhat/Centos
  yum:
    name: cronie
    state: present
  when: ansible_os_family == 'RedHat'

- name: Define postgresql_version to 13 for RedHat/CentOS.
  set_fact:
    postgresql_version: "13"
  when: ansible_os_family == "RedHat"

# ALL Systems
- name: Install dependencies.
  package:
    name: "{{ item }}"
  loop:
    - unzip
    - sendmail

- name: Install curl for all systems
  package: name=curl
  when: ansible_os_family != "RedHat"

- name: Install curl via DNF
  ansible.builtin.dnf:
    name: curl
    state: present
    allowerasing: true
  when: ansible_os_family == "RedHat"

- name: Add MariaDB repository
  copy:
    dest: /etc/yum.repos.d/MariaDB.repo
    content: |
      [mariadb]
      name = MariaDB
      baseurl = http://yum.mariadb.org/10.6/rhel9-amd64
      gpgkey=https://yum.mariadb.org/RPM-GPG-KEY-MariaDB
      gpgcheck=1
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int < 10
#
# PHP Packages
#

# ALL Distribution (note the difference in name from Debian and Ubuntu, version prefixing)
- name: Set php_packages for all distributions
  block:
    - name: Set Php Major version variable
      set_fact:
        php_major_version: "{{ php_version.split('.')[0] }}"
    - name: Set Php package prefix for all systems
      set_fact:
        php_prefix: "php"
    - name: Set Php package prefix for versioned Debian like packages
      set_fact:
        php_prefix: "php{{ php_version }}"
      when:
        - ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu'
        - php_package_strategy == 'versioned'
    - name: Set all php packages names
      set_fact:
        php_packages:
          - "{{ php_prefix }}-cli"
          - "{{ php_prefix }}-common"
          - "{{ php_prefix }}-curl"
          - "{{ php_prefix }}-gd"
          - "{{ php_prefix }}-intl"
          - "{{ php_prefix }}-mbstring"
          - "{{ php_prefix }}-opcache"
          - "{{ php_prefix }}-readline"
          - "{{ php_prefix }}-soap"
          - "{{ php_prefix }}-xml"
          - "{{ php_prefix }}-xmlrpc"
          - "{{ php_prefix }}-fpm"
          - "{{ php_prefix }}-cli"
          - "{{ php_prefix }}-ldap"
          - "{{ php_prefix }}-solr"
          - "{{ php_prefix }}-redis"
          - "{{ php_prefix }}-apcu"
          - "{{ php_prefix }}-zip"
          - "{{ php_prefix }}-intl"
# ALL Distribution (note the difference in name from Debian and Ubuntu, version prefixing)
- name: Set php_packages depending on PHP version
  set_fact:
    php_packages: "{{ php_packages + [ (php_prefix + '-json') ] }}"
  when: php_major_version != "8"

- name: Set php_packages depending on PHP version 8
  set_fact:
    php_packages: "{{ php_packages + [ (php_prefix + '-exif') ] }}"
  when: php_major_version == "8"

- name: Drop unsupported PHP extensions on RedHat 10+.
  set_fact:
    php_packages: "{{ php_packages | difference(['php-solr', 'php-xmlrpc']) }}"
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int >= 10

- name: Set php_packages (apcu) for PHP Rocky.
  set_fact:
    php_packages: "{{ php_packages + ['php-pecl-apcu'] }}"
  when: ansible_os_family == "RedHat"

- name: Set php_package for postgres
  set_fact:
    php_packages: "{{ php_packages + [ (php_prefix + '-pgsql') ] }}"
  when: dbengine == 'postgres' or ( install_all_db_php_modules is defined and install_all_db_php_modules )

- name: Set php_package for MySQL on RedHat 10+.
  set_fact:
    php_packages: "{{ php_packages + [ (php_prefix + '-mysqlnd') ] }}"
  when:
    - dbengine == 'mysql' or ( install_all_db_php_modules is defined and install_all_db_php_modules )
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int >= 10

- name: Set php_package for MySQL.
  set_fact:
    php_packages: "{{ php_packages + [ (php_prefix + '-mysql') ] }}"
  when:
    - dbengine == 'mysql' or ( install_all_db_php_modules is defined and install_all_db_php_modules )
    - ansible_os_family != "RedHat" or ansible_distribution_major_version | int < 10
