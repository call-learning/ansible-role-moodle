---

- name: Reset password
  command: "{{ item }}"
  args:
    chdir: "{{ moodle_src_path }}"
  loop:
    - "{{ moodle_php_bin }} admin/cli/purge_caches.php"
    - >-
      {{ moodle_php_bin }} admin/cli/reset_password.php
      --username="{{ moodle_site_admin.username }}" --password="{{ moodle_site_admin.password }}"
  become: true
  become_user: "{{ moodle_webserver_user }}"
  changed_when: false
  no_log: true
