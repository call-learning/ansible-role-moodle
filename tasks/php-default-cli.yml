---

- name: Require explicit php_version when managing php CLI alternatives
  assert:
    that:
      - php_version is defined
      - php_version | length > 0
    fail_msg: "Set php_version explicitly before running tasks/php-default-cli.yml."
  when:
    - php_set_default_cli | bool
    - ansible_facts["distribution"] in ['Debian', 'Ubuntu']

- name: Manage the default PHP CLI on Debian/Ubuntu
  when:
    - php_set_default_cli | bool
    - ansible_facts["distribution"] in ['Debian', 'Ubuntu']
  vars:
    php_cli_versioned_bin: "/usr/bin/php{{ php_version }}"
  block:
    - name: Check requested PHP CLI binary exists
      stat:
        path: "{{ php_cli_versioned_bin }}"
      register: php_cli_versioned_bin_stat

    - name: Fail when requested PHP CLI binary is missing
      fail:
        msg: >-
          Cannot switch the default php CLI to {{ php_cli_versioned_bin }} because
          that binary is missing. Install the requested PHP CLI package first.
      when: not php_cli_versioned_bin_stat.stat.exists

    - name: Read current default PHP CLI target
      command:
        argv:
          - readlink
          - -f
          - /usr/bin/php
      register: php_default_cli_target
      changed_when: false

    - name: Set the default PHP CLI alternative
      command:
        argv:
          - update-alternatives
          - --set
          - php
          - "{{ php_cli_versioned_bin }}"
      when: php_default_cli_target.stdout != php_cli_versioned_bin
