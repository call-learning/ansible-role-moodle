---
- name: Check whether Moodle config already exists
  stat:
    path: "{{ moodle_src_path }}/config.php"
  register: moodle_config

- name: Create Moodle config for a new installation
  template:
    src: config.php.j2
    dest: "{{ moodle_src_path }}/config.php"
    mode: "0640"
    owner: "{{ moodle_webserver_user }}"
    group: "{{ moodle_webserver_group }}"
  when:
    - moodle_manage_config | bool
    - not moodle_config.stat.exists
  no_log: true

- name: Update existing Moodle config when explicitly requested
  template:
    src: config.php.j2
    dest: "{{ moodle_src_path }}/config.php"
    mode: "0640"
    owner: "{{ moodle_webserver_user }}"
    group: "{{ moodle_webserver_group }}"
  when:
    - moodle_manage_config | bool
    - moodle_overwrite_config | bool
    - moodle_config.stat.exists
  no_log: true

- name: Fail when config management is disabled and config is missing
  fail:
    msg: >-
      {{ moodle_src_path }}/config.php is missing. Either enable moodle_manage_config
      or provide an existing Moodle configuration before running setup.
  when:
    - not (moodle_manage_config | bool)
    - not moodle_config.stat.exists

- name: Check Moodle status
  block:
    - name: Run Moodle status check
      check_moodle:
        install_dir: "{{ moodle_src_path }}"
      become: true
      become_user: "{{ moodle_webserver_user }}"
      register: moodle_state
      failed_when: moodle_state.failed | default(false)

    - name: Show Moodle status
      debug:
        msg: >
          Moodle Status:
          Installed: {{ moodle_state.moodle_is_installed | default('Unknown') }}
          Needs Upgrading: {{ moodle_state.moodle_needs_upgrading | default('Unknown') }}
          Version: {{ moodle_state.current_version | default('N/A') }}
          Release: {{ moodle_state.current_release | default('N/A') }}
  rescue:
    - name: Handle failures in Moodle status check
      debug:
        msg: >
          An unexpected error occurred during the Moodle status check.
          Please investigate further.
          CLI Output: {{ moodle_state.msg | default('N/A') }}
          CLI Error Output: {{ moodle_state.msg | default('N/A') }}
    - set_fact:
        moodle_check_failed: true
  always:
    - name: Finalize Moodle status check
      debug:
        msg: "Moodle status check completed."

- name: Install Moodle
  include_tasks: commands/moodle-install.yml
  when:
    - not (moodle_state.moodle_is_installed | default(false) | bool)
    - not (moodle_check_failed | default(false) | bool)

- name: Change admin password
  import_tasks: commands/moodle-resetpw.yml
  when:
    - moodle_state.moodle_is_installed | default(false) | bool
    - moodle_reset_admin_password | bool
    - not (moodle_check_failed | default(false) | bool)

- name: Launch update (if needed)
  import_tasks: commands/moodle-update.yml
  when:
    - moodle_state.moodle_is_installed | default(false) | bool
    - moodle_state.moodle_needs_upgrading | default(false) | bool
    - not (moodle_check_failed | default(false) | bool)

- name: Ensure cron is installed (Ubuntu 24.04 or later only)
  apt:
    name: cron
    state: present
  become: true
  when:
    - ansible_facts["distribution"] == "Ubuntu"
    - ansible_facts["distribution_version"] is version('24.04', '>=')

- name: Setup cron
  cron:
    name: "Moodle Cron"
    minute: "{{ moodle_cron_periodicity }}"
    job: "{{ moodle_php_bin }} {{ moodle_src_path }}/admin/cli/cron.php 2>&1"
    user: "{{ moodle_webserver_user }}"
  when:
    - moodle_cron_periodicity is defined
    - moodle_cron_periodicity | int > 0

- name: Setup adhoc task
  cron:
    name: "Moodle Adhoc Task"
    minute: "{{ moodle_cron_periodicity }}"
    job: >-
      {{ moodle_php_bin }} {{ moodle_src_path }}/admin/cli/adhoc_task.php
      --execute --keep-alive {{ 59 * (moodle_cron_periodicity | int) }} 2>&1
    user: "{{ moodle_webserver_user }}"
  when:
    - moodle_cron_periodicity is defined
    - moodle_cron_periodicity | int > 0
