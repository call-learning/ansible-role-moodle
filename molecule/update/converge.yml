---

- name: Converge
  hosts: all
  become: true

  vars:
    moodle_update_from_version: "{{ lookup('ansible.builtin.env', 'MOODLE_UPDATE_FROM_VERSION') | default('', true) }}"
    moodle_update_to_version: "{{ lookup('ansible.builtin.env', 'MOODLE_UPDATE_TO_VERSION') | default('', true) }}"

  vars_files:
    - ../default/vars/vars.yml
    - ../default/vars/vars-db.yml

  pre_tasks:
    - name: Ensure update versions are provided
      assert:
        that:
          - moodle_update_from_version | length > 0
          - moodle_update_to_version | length > 0
        fail_msg: "Set MOODLE_UPDATE_FROM_VERSION and MOODLE_UPDATE_TO_VERSION for the update scenario."

    - name: Import Moodle PHP Setup role to set the web server config
      import_role:
        name: call_learning.moodle
        tasks_from: phpsql-setup
      tags: install
    - name: Set the initial Moodle version for the update test
      set_fact:
        moodle_version: "{{ moodle_update_from_version }}"
  tasks:
    - name: Apply Molecule pre-support-role distro specifics
      include_tasks: ../default/tasks/include-distro-specifics.yml
      vars:
        molecule_distro_specific_dir: "{{ playbook_dir }}/../default/distro-specifics"
        molecule_distro_specific_phase: converge-before-support-roles
      tags: molecule-idempotence-notest

    - name: Install Molecule support roles
      block:
        - name: geerlingguy.repo-remi
          import_role:
            name: geerlingguy.repo-remi
          when: ansible_facts["os_family"] == "RedHat"

        - name: geerlingguy.git
          import_role:
            name: geerlingguy.git

        - name: geerlingguy.apache
          import_role:
            name: geerlingguy.apache

        - name: geerlingguy.mysql
          import_role:
            name: geerlingguy.mysql

        - name: geerlingguy.php
          import_role:
            name: geerlingguy.php

        - name: geerlingguy.php-mysql
          import_role:
            name: geerlingguy.php-mysql
          when: >-
            ansible_facts["os_family"] != 'RedHat'
            or (ansible_facts["distribution_major_version"] | int) < 10

        - name: geerlingguy.apache-php-fpm
          import_role:
            name: geerlingguy.apache-php-fpm
      tags: molecule-idempotence-notest

    - name: Apply Molecule pre-role distro specifics
      include_tasks: ../default/tasks/include-distro-specifics.yml
      vars:
        molecule_distro_specific_dir: "{{ playbook_dir }}/../default/distro-specifics"
        molecule_distro_specific_phase: converge-before-role
      tags: molecule-idempotence-notest

    - name: Flush handlers before running the Moodle role
      meta: flush_handlers

    # Finally the role under test
    - name: call_learning.moodle
      import_role:
        name: call_learning.moodle

    - name: Check the state of current moodle
      check_moodle:
        install_dir: "{{ moodle_src_path }}"
      become: true
      become_user: "{{ moodle_webserver_user }}"
      register: initial_moodle_state
    - name: Check the initial version of moodle is installed
      assert:
        that:
          - initial_moodle_state.moodle_is_installed
          - not initial_moodle_state.moodle_needs_upgrading | bool
    - name: Update moodle to the target version
      include_role:
        name: call_learning.moodle
      vars:
        moodle_version: "{{ moodle_update_to_version }}"
    - name: Check the state of current moodle
      check_moodle:
        install_dir: "{{ moodle_src_path }}"
      become: true
      become_user: "{{ moodle_webserver_user }}"
      register: updated_moodle_state
    - name: Check the update completed successfully
      assert:
        that:
          - updated_moodle_state.moodle_is_installed
          - updated_moodle_state.current_release != initial_moodle_state.current_release
          - not updated_moodle_state.moodle_needs_upgrading | bool

    - name: Apply Molecule post-role distro specifics
      include_tasks: ../default/tasks/include-distro-specifics.yml
      vars:
        molecule_distro_specific_dir: "{{ playbook_dir }}/../default/distro-specifics"
        molecule_distro_specific_phase: converge-after-role
      tags: molecule-idempotence-notest
