---
- name: Converge
  hosts: all
  vars_files:
    - vars/vars.yml
    - vars/vars-db.yml
  pre_tasks:
    - name: Import Moodle PHP Setup role to set the web server config
      import_role:
        name: call_learning.moodle
        tasks_from: phpsql-setup
      tags: install
  roles:
    - role: geerlingguy.repo-remi
      when: ansible_os_family == 'RedHat'
      tags: molecule-idempotence-notest
    - name: geerlingguy.git
      tags: molecule-idempotence-notest
    # Apache
    - name: geerlingguy.apache
      tags: molecule-idempotence-notest
    # Mysql
    - name: geerlingguy.mysql
      tags: molecule-idempotence-notest
    - name: geerlingguy.php
      tags: molecule-idempotence-notest
    # Then PHP Database libraries
    - name: geerlingguy.php-mysql
      tags: molecule-idempotence-notest
    # PHP FPM
    - name: geerlingguy.apache-php-fpm
      tags: molecule-idempotence-notest
  tasks:
    - name: Ensure php-fpm is started on Debian before flushing handlers
      service:
        name: "{{ php_fpm_daemon }}"
        state: started
      when:
        - ansible_os_family == 'Debian'
        - php_enable_php_fpm | default(false)
      tags: molecule-idempotence-notest

    - name: Flush handlers before running the Moodle role
      meta: flush_handlers

    # Finally the role under test
    - name: call_learning.moodle
      import_role:
        name: call_learning.moodle
