---
# Database configuration
moodle_database:
  dbtype: >-
    {{ (ansible_distribution == "Rocky" or ansible_distribution == "Debian")
    | ternary('mariadb', 'mysqli') }}
  dbhost: "localhost"
  dbname: "moodle"
  dbuser: "username"
  dbpass: "password"
  dbprefix: "mdl_"

mysql_databases:
  - name: "{{ moodle_database.dbname }}"
    encoding: UTF8
    collation: utf8_general_ci

mysql_users:
  - name: "{{ moodle_database.dbuser }}"
    host: "%"
    password: "{{ moodle_database.dbpass }}"
    priv: "{{ moodle_database.dbname }}.*:ALL"

dbengine: "mysql"

php_mysql_package: >-
  {{ 'php-mysqlnd' if (ansible_os_family == 'RedHat' and ansible_distribution_major_version | int >= 10)
  else 'php' ~ php_version ~ '-mysql' }}
