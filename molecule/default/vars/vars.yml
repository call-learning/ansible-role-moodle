---
# Moodle Version
moodle_version: "{{ lookup('ansible.builtin.env', 'MOODLE_VERSION') | default('MOODLE_405_STABLE', true) }}"
moodle_domain_name: "moodle.test"
moodle_release_prefix: "{{ lookup('ansible.builtin.env', 'MOODLE_RELEASE_PREFIX') | default('4.5.', true) }}"

php_enable_webserver: false
php_enable_php_fpm: true
php_fpm_handler_state: "{{ lookup('ansible.builtin.env', 'PHP_FPM_HANDLER_STATE') | default('restarted', true) }}"
php_fpm_listen: "127.0.0.1:9000"
php_enable_apc: true
php_max_input_vars: "5000"
molecule_verify_debug: "{{ lookup('ansible.builtin.env', 'MOLECULE_VERIFY_DEBUG') | default(false, true) | bool }}"
php_default_version_debian: >-
  {{
    '8.4'
    if (ansible_facts["distribution"] == 'Debian' and (ansible_facts["distribution_major_version"] | int) >= 13)
    else '8.2'
    if (ansible_facts["distribution"] == 'Debian')
    else '8.3'
    if (ansible_facts["distribution"] == 'Ubuntu' and (ansible_facts["distribution_major_version"] | int) >= 24)
    else '8.1'
    if (ansible_facts["distribution"] == 'Ubuntu')
    else '8.2'
  }}
php_enablerepo: "remi,remi-php82"
php_install_recommends: false

mysql_python_package_debian: python3-mysqldb

apache_mods_enabled:
  - expires
  - ssl
  - rewrite
  - proxy
  - proxy_fcgi
apache_remove_default_vhost: true
apache_vhosts:
  - servername: "{{ moodle_domain_name }}"
    serveralias: "www.{{ moodle_domain_name }}"
    documentroot: "{{ moodle_src_path }}"
    extra_parameters: |
      <Directory "{{ moodle_src_path }}">
        Require all granted
        AllowOverride All
        Options FollowSymLinks
      </Directory>

      <FilesMatch \.php$>
        SetHandler "proxy:fcgi://{{ php_fpm_listen }}"
      </FilesMatch>
