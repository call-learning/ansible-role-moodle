---
php_enable_webserver: false
php_version: >-
  {{
    (
      '8.4' if ansible_distribution == 'Debian' and (ansible_distribution_major_version | int) >= 13
      else '8.3' if ansible_distribution == 'Ubuntu' and (ansible_distribution_major_version | int) >= 24
      else '8.1'
    )
  }}
php_package_strategy: "native"
php_enable_php_fpm: true
php_fpm_listen: "127.0.0.1:9000"
php_enable_apc: true
php_max_input_vars: "5000"

mysql_python_package_debian: python3-mysqldb

apache_mods_enabled:
  - expires
  - ssl
  - rewrite
  - proxy
  - proxy_fcgi
apache_remove_default_vhost: true
apache_vhosts:
  - servername: "{{ moodle_domain_name }}"
    serveralias: "www.{{ moodle_domain_name }}"
    documentroot: "{{ moodle_src_path }}"
    extra_parameters: |
      <FilesMatch \.php$>
        SetHandler "proxy:fcgi://{{ php_fpm_listen }}"
      </FilesMatch>

# Make sure that the rockylinux9 repo remi works
# See https://github.com/geerlingguy/ansible-role-repo-remi/pull/30/commits/ff750e8fa4eb65849a0459d157810f47bb1ba330
remi_repo_gpg_key_url: "https://rpms.remirepo.net/RPM-GPG-KEY-remi2021"

# Moodle Version
moodle_version: "v4.3.8"
moodle_domain_name: "moodle.test"
moodle_target_release: "4.3.8 (Build: 20241007)"
